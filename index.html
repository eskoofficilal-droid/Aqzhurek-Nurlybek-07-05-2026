<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ақжүрек пен Нұрлыбек - Сүндет той</title>
    
    <meta property="og:title" content="Сүндет тойға шақыру!" />
    <meta property="og:description" content="Құрметті қонақтар! Шақыруды көру үшін сілтемені басыңыз." />
    <meta property="og:image" content="https://eskoofficilal-droid.github.io/Aqzhurek-Nurlybek-07-05-2026/preview.jpg" />
    <meta property="og:url" content="https://eskoofficilal-droid.github.io/Aqzhurek-Nurlybek-07-05-2026/" />
    <meta property="og:type" content="website" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #fcfcfc;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: #4a3427;
        }

        /* Артқы фон және Контейнер */
        .main-wrapper {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Бірінші сурет (Бас жағы) */
        .hero-image {
            width: 100%;
            display: block;
        }

        /* Екінші сурет (Мәтін блогы) */
        .content-image {
            width: 90%;
            margin: 20px auto;
            display: block;
            border-radius: 10px;
        }

        /* Таймер стилі */
        .timer-section {
            background: #fdf8f5;
            padding: 30px 10px;
            text-align: center;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .countdown-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            min-width: 65px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .countdown-item span:first-child {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: #b38b6d;
        }

        /* Форма стилі */
        .rsvp-section {
            padding: 40px 20px;
            text-align: center;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
            text-align: center;
            outline: none;
        }

        .btn-submit {
            background-color: #b38b6d;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #8c6d55;
        }

        /* Карта батырмасы */
        .map-btn {
            display: inline-block;
            background: #4a3427;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Музыкалық модаль */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="musicModal" class="modal-overlay">
    <div class="text-center p-4">
        <h2 style="font-family: 'Great Vibes', cursive; font-size: 40px;">Қош келдіңіз!</h2>
        <p>Шақыртуды ашу үшін батырманы басыңыз</p>
        <button id="playMusic" class="btn-submit">Ашу</button>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="3.mp3" type="audio/mpeg">
</audio>

<div class="main-wrapper">
    <img src="4.png" class="hero-image" alt="Ақжүрек пен Нұрлыбек">

    <div class="text-center py-4">
        <img src="5.png" class="content-image" alt="Шақырту мәтіні">
    </div>

    <style>
    .time-block {
        background: #fff8f5;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        display: inline-block;
    }
    </style>
<div class="text-center py-4"> <h5 class="fw-bold">Мекен-жайы:</h5> 
    <h5>Көксу ауданы, "«Дастархан»" мейрамханасы<br></h5>
    <h5>Телефон номері: 87471470498<br></h5>
    <a href="https://www.google.com/maps/dir/?api=1&destination=44.895444,78.211316" target="_blank" class="map-btn">Картадан көру (2GIS)</a> </div>
    <div class="text-center py-4">
    <div class="time-block">
        <h2 class="fw-bold" style="font-size: 30px;">ТОЙ УАҚЫТЫ</h2>
        <p style="font-size: 42px; font-weight: bold;">7 МАМЫР</p>
        <p style="font-size: 30px;">18:00-ДЕ БАСТАЛАДЫ</p>
    </div>
</div>
    <div class="timer-section"> 
        <h5 class="fw-bold">Тойдың басталуына:</h5>
        <div class="countdown-container">
            <div class="countdown-item"><span id="days">00</span><span>Күн</span></div>
            <div class="countdown-item"><span id="hours">00</span><span>Сағат</span></div>
            <div class="countdown-item"><span id="minutes">00</span><span>Мин</span></div>
            <div class="countdown-item"><span id="seconds">00</span><span>Сек</span></div>
        </div>
    </div>

    <div class="rsvp-section">
        
        <h5 class="fw-bold mb-4">Тілек білдіру немесе растау:</h5>
        <form id="rsvpForm">
            <input type="text" name="guestName" placeholder="Есіміңізді жазыңыз" required>
            
            <div class="text-start mt-3 px-3">
                <input type="radio" name="status" value="Иә, барамын" id="status1" checked>
                <label for="status1">Иә, барамын</label><br>
                <input type="radio" name="status" value="Жұбайыммен" id="status2">
                <label for="status2">Жұбайыммен барамын</label><br>
                <input type="radio" name="status" value="Өкінішке орай, бара алмаймын" id="status3">
                <label for="status3">Бара алмаймын</label>
            </div>

            <button type="submit" class="btn-submit">Жіберу</button>
        </form>
    </div>
    </div>
        <script>
document.getElementById("rsvpForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.querySelector('input[name="guestName"]').value;
    let status = document.querySelector('input[name="status"]:checked').value;

    let message = encodeURIComponent(`Қонақ аты: ${name}\nЖауабы: ${status}`);
    let phoneNumber = "77471470498";

    let whatsappURL = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${message}`;

    window.location.href = whatsappURL;
});
</script>
    <div class="text-center pb-5 opacity-50">
        <small>© 2026 Сүндет той шақыруы</small>
    </div>
</div>

<script>
    // Музыка мен Модаль
    const modal = document.getElementById('musicModal');
    const playBtn = document.getElementById('playMusic');
    const audio = document.getElementById('bgMusic');

    playBtn.addEventListener('click', () => {
        audio.play();
        modal.style.display = 'none';
    });

    // Таймер (21 маусым 2026 жыл)
    const targetDate = new Date("May 7, 2026 00:00:00").getTime();
    
    function updateTimer() {
        const now = new Date().getTime();
        const diff = targetDate - now;
        
        if (diff > 0) {
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // Форма жіберу
    document.getElementById('rsvpForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Жауабыңыз жіберілді! Рахмет.');
        this.reset();
    });
</script>

</body>
</html>
